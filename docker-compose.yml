services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ats_backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file:
      - .env                      # loads OPENAI_API_KEY from .env file
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=0             # set to 1 for hot-reload during dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/"]
      interval: 20s
      timeout: 5s
      retries: 3
